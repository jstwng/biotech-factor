# ---- Sample Period ----
start_date: "2015-01-01"
end_date: "2024-12-31"
frequency: "monthly"

# ---- ETFs ----
etfs:
  - ticker: "IBB"
    name: "iShares Nasdaq Biotechnology ETF"
    weighting: "cap-weighted"
  - ticker: "XBI"
    name: "SPDR S&P Biotech ETF"
    weighting: "equal-weighted"

# ---- Fama-French ----
ff_url: "https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/ftp/F-F_Research_Data_5_Factors_2x3_CSV.zip"
ff_factors: ["Mkt-RF", "SMB", "HML", "RMW", "CMA", "RF"]

# ---- ClinicalTrials.gov API ----
ct_api_base: "https://clinicaltrials.gov/api/v2/studies"
ct_api_delay_seconds: 0.5
ct_study_type: "INTERVENTIONAL"
ct_fields:
  - "NCTId"
  - "BriefTitle"
  - "OverallStatus"
  - "Phase"
  - "Condition"
  - "LeadSponsorName"
  - "StartDate"
  - "PrimaryCompletionDate"
  - "StatusVerifiedDate"
  - "CollaboratorName"

# ---- Success Rates (Wong et al. 2019, cumulative P(Approval)) ----
success_rates:
  overall:
    "Phase 1":         0.138
    "Phase 1/Phase 2": 0.138
    "Phase 2":         0.214
    "Phase 2/Phase 3": 0.214
    "Phase 3":         0.500
    "Phase 4":         1.000
    "NDA/BLA":         0.832
  disease_multipliers:
    "Oncology":              0.246
    "Infectious Disease":    1.449
    "Cardiovascular":        0.652
    "CNS/Neurology":         0.435
    "Rare Disease":          1.014
    "Metabolic/Endocrine":   0.797
    "Other":                 1.000

# ---- Factor Construction ----
factor:
  quintile_long: 0.80
  quintile_short: 0.20
  weighting: "equal"
  return_lag: 1

# ---- Statistical Testing ----
stats:
  newey_west_lag: 3
  significance_level: 0.05
  bonferroni_tests: 2
  rolling_window_months: 36
  ljung_box_lags: [1, 3, 6, 12]

# ---- Entity Resolution ----
entity_resolution:
  fuzzy_match_threshold: 85
  auto_accept_threshold: 95
  manual_review_range: [85, 95]

# ---- Random Seed ----
random_seed: 42
